<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>테이블오더 소개페이지</title>
    <link rel="stylesheet" href="styles/showcase.css">
    <script src="scripts/showcase.js" defer></script>
</head>
<body>
    <main class="page">
        <!-- 표지 / 인트로 -->
        <section class="hero-section">
            <h1 class="title-font">통합 주문 시스템</h1>
            <ul class="">
                <li>카페 테이블오더</li>
                <li>POS 관리자 화면</li>
            </ul>
        </section>

        <!-- 테이블오더 테스트 -->
        <section class="preview-section">
            <h2>설계한 주문 흐름과 로직을 직접 경험해보세요.</h2>
            <iframe src="" frameborder="0"></iframe>
        </section>

        <!-- 주문 흐름별 코드 소개 -->
        <section class="flow-section">
            <div class="inner">
                <h2 class="blind"> 주문 흐름에 맞춰 구현한 기능들 </h2>
                <article class="item">
                    <h3>메뉴 데이터 설계와 화면 구성</h3>
                </article>
                <article class="item">
                    <h3>서브탭과 연결되는 슬라이드 탐색</h3>
                </article>
                <article class="item">
                    <h3>옵션 데이터를 선택 구조로 재구성</h3>
                </article>
                <article class="item">
                    <h3>옵션 조합으로 구성되는 장바구니</h3>
                </article>
                <article class="item">
                    <h3>주문완료 & 초기화</h3>
                </article>
            </div>
        </section>

        <!-- 관리자 POS 디자인 -->
        <section class="pos-section">
            <h2>관리자 POS</h2>
        </section>

        <!-- 프로젝트 회고 -->
        <section class="review-section">
            <h2>성장의 기록</h2>
        </section>
    </main>

</body>
</html>
