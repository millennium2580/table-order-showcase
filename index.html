<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>테이블오더</title>
    <!-- 프리탠다드 CDN -->
    <link rel="stylesheet" href="styles/common.css"> 
    <link rel="stylesheet" href="styles/layout.css"> 
    <script src="scripts/data.js" defer></script> 
    <script src="scripts/main.js" defer></script> 
</head>

<body>
    <div class="wrapper">
        <header id="header" class="header">
            <div class="table-num header-brand">Table. 05</div>
            <ul class="tab-main">
                <li data-main="new"><button class="title-section">시즌메뉴</button></li>
                <li data-main="coffee"><button class="title-section">커피</button></li>
                <li data-main="noncoffee"><button class="title-section">논커피</button></li>
                <li data-main="blended"><button class="title-section">블랜디드</button></li>
                <li data-main="fizzio"><button class="title-section">피지오</button></li>
                <li data-main="tea"><button class="title-section">티</button></li>
                <li data-main="dessert"><button class="title-section">디저트</button></li>
            </ul>
            
            <div class="order-history"><button class="title-section">주문내역</button></div>
            <div class="call-staff"><button class="title-section">직원호출</button></div>
        </header>

        <section id="products">
            <ul class="tab-sub"></ul> <!-- 서브카테고리 -->
            <div class="products scrollbar">
                <div class="product-list"></div> <!-- 상품리스트 -->
            </div>
        </section>

        <section id="options">
            <div class="inbox">
                <div class="box-top">
                    <span class="title-section">메뉴 상세정보</span>
                    <button class="close-btn"><img src="images/icon/func/close.png" alt="전체메뉴"></button>
                </div>
                <div class="box-mid">
                    <div class="product-info"></div> <!-- 상품 기본 영역 -->
                    <div class="option-list scrollbar">
                        <div class="opt-ly">
                            <div class="temper-been opt-box"></div>
                            <div class="syrup-iceb opt-box"></div>
                            <div class="size-shot opt-box"></div>
                            <div class="whipping-drizzle opt-box"></div>
                        </div>

                    </div>
                </div>
                <div class="box-btm">
                    <div class="opt-box">
                        <div class="quantity">
                            <span class="num-txt title-section">수량</span>
                            <div class="opt-num">
                                <button class="minus title-section" data-btn="minus"><img src="images/icon/func/minus.png" alt="빼기"></button>
                                <span class="count manu-name">1</span>
                                <button class="plus title-section" data-btn="plus"><img src="images/icon/func/plus.png" alt="더하기"></button>
                            </div>
                        </div>
                        <div class="line">l</div>
                        <p class="price title-section">
                            <span class="opt-txt">총 금액</span>
                            <span class="opt-price"></span>원
                        </p>
                    </div>
                    <button class="cart-add title-section">장바구니</button>
                </div>
            </div>
        </section>
        
        <section id="cart">
            <div class="cart-inbox">
                <div class="cart-title header-brand">장바구니</div>
                <ul class="cart-list scrollbar"></ul>
                <div class="order-area">
                    <p>
                        <span class="title-section">총금액</span>
                        <strong class="order-price total-price"></strong> <!-- reset: strong{ font-weight: normal; } -->
                    </p>
                    <div class="order-btn">
                        <button class="title-section">주문하기</button>
                    </div>
                </div>
                <div class="cart-close-btn"></div>
            </div>
        </section>

        <div class="msg-area">
        <p class="inner">메세지가 보임</p>
        
    </div>
</body>
</html>
